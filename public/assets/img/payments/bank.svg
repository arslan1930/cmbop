    <rect x="27.4" y="20" width="3.2" height="12"/>
    <rect x="33.8" y="20" width="3.2" height="12"/>
    <rect x="19" y="32" width="22" height="2.5"/>
    <!-- BANK wordmark -->
    <text x="70" y="31" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5">BANK</text>
  </g>
